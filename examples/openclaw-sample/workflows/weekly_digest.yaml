name: weekly_digest
description: "Weekly RSS roundup posted to Slack — drier theme grouping than the daily digest."
triggers:
  - kind: cron
    spec: "0 10 * * MON"
steps:
  - id: fetch
    plugin: fetch_articles
    with:
      source: "${env.RSS_URL}"
  - id: dedupe
    plugin: dedupe_seen
    with:
      items: "${steps.fetch.output}"
  - id: summarize
    plugin: llm_summarize
    with:
      prompt: summarize_weekly
      input: "${steps.dedupe.output}"
  - id: notify
    plugin: slack_post
    with:
      channel: "${env.SLACK_CHANNEL}"
      body: "${steps.summarize.output}"
