name: ticket_router
kind: router
runtime: python
pure: false
config:
  entrypoint: "plugins.ticket_router:route"
  routes:
    bug: jira_create
    billing: stripe_dispute_open
    feedback: slack_post
inputs:
  - {name: ticket, type: object, required: true}
  - {name: category, type: string, required: true}
outputs:
  - {name: ok, type: boolean}
