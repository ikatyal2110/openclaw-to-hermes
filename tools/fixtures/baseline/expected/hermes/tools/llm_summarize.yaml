name: llm_summarize
description: "llm_summarize (http) \u2014 HTTP tool \u2014 direct map."
runtime: http
spec:
  method: POST
  url_template: https://api.openai.com/v1/chat/completions
  auth: Bearer ${env.OPENAI_API_KEY}
inputs:
- name: prompt
  type: string
  required: true
- name: input
  type: string
  required: true
outputs:
- name: text
  type: string
