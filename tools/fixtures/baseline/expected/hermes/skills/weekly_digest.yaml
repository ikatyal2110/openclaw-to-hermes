name: weekly_digest
description: "Weekly RSS roundup posted to Slack \u2014 drier theme grouping than the daily digest."
when_to_use:
- 'Scheduled trigger fires (cron: 0 10 * * MON)'
inputs:
  rss_url:
    type: string
    env: RSS_URL
  slack_channel:
    type: string
    env: SLACK_CHANNEL
procedure:
- tool: fetch_articles
  with:
    source: ${rss_url}
  as: fetch
- tool: dedupe_seen
  with:
    items: ${fetch}
  as: dedupe
- tool: llm_summarize
  with:
    prompt: summarize_weekly
    input: ${dedupe}
  as: summarize
- tool: slack_post
  with:
    channel: ${slack_channel}
    body: ${summarize}
  as: notify
_praxis:
  confidence: 0.95
