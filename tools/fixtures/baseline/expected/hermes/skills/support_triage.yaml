name: support_triage
description: Classify incoming support tickets and route to the right system.
when_to_use:
- "Equivalent task is requested (classify_ticket \u2192 ticket_router)"
- HTTP request arrives at webhook path '/hooks/support'
procedure:
- tool: classify_ticket
  with:
    prompt: classify
    input: ${trigger.body}
  as: classify
- tool: ticket_router
  with:
    ticket: ${trigger.body}
    category: ${steps.classify.output.category}
  as: route
_praxis:
  confidence: 0.95
