[build-system]
requires = ["hatchling>=1.20"]
build-backend = "hatchling.build"

[project]
name = "praxis-core"
version = "0.3.0"
description = "Praxis: migration engine and semantic translator from OpenClaw to Hermes agent systems."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
authors = [{name = "Praxis contributors"}]
keywords = ["agents", "openclaw", "hermes", "migration", "llm"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Compilers",
]
dependencies = [
  "pydantic>=2.6",
  "pyyaml>=6.0",
  "typer>=0.12",
  "rich>=13.7",
  "networkx>=3.2",
  "jsonschema>=4.21",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-cov>=4.1",
  "ruff>=0.4",
  "mypy>=1.10",
  "types-PyYAML",
  "types-jsonschema",
]

[project.scripts]
praxis = "praxis_core.cli:app"

[project.urls]
Homepage = "https://github.com/praxis-dev/praxis"
Issues   = "https://github.com/praxis-dev/praxis/issues"

[tool.hatch.build.targets.wheel]
packages = ["praxis_core"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
# UP042: (str, Enum) pattern is intentional — Pydantic v2 + use_enum_values=True
# relies on it, and StrEnum changes the str() repr in 3.12.
ignore = ["E501", "UP042"]

[tool.ruff.lint.per-file-ignores]
# B008: typer's Argument()/Option() must be evaluated at decoration time.
"praxis_core/cli.py" = ["B008"]

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra --strict-markers --strict-config"
filterwarnings = ["error"]
